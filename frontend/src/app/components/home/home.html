<header class="hero-banner d-flex align-items-center text-center text-white">
  <div class="container">
    <h1 class="display-3 fw-bold text-shadow">BARBER APP</h1>
    <p class="lead mb-4 text-shadow">Ahora podes reservar turnos de la manera mas rápida!</p>
    
    <!-- apunta a staff -->
    <a href="#staff" class="btn btn-light btn-lg px-4 py-3 fw-bold rounded-pill hover-scale shadow">
      ✂️ Nuestro Staff
    </a>
  </div>
</header>


<div id="staff" class="container my-5 py-4">
  <div class="text-center mb-5">
    <h2 class="fw-bold text-dark">Nuestros Barberos</h2>
    <p class="text-muted">Elegí al profesional que mejor se adapte a tu estilo</p>
  </div>
  

  <div *ngIf="cargando" class="text-center my-5">
    <div class="spinner-border text-dark" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-2 text-muted">Buscando barberos disponibles...</p>
  </div>

 




  <div *ngIf="!cargando && !errorConexion && peluqueros.length > 0" class="row g-4 justify-content-center">
    
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let p of peluqueros">
      <div class="card h-100 shadow-sm border-0 hover-scale">
   

        <img 
          [src]="p.avatar || 'https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=400'" 
          class="card-img-top imagen-barbero" 
          [alt]="p.nombre"
          onerror="this.src='https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=400'"
        >
        <div class="card-body d-flex flex-column text-center">
          <h5 class="card-title fw-bold text-dark mb-2">{{ p.nombre }}</h5>
          <p class="card-text text-muted mb-0">{{ p.descripcion }}</p>
        </div>
      </div>
    </div>
